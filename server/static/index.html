<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QA Auto Portales</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; color: #f8fafc; }
    header p  { font-size: 0.9rem; color: #64748b; margin-top: 4px; }

    .card {
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 24px;
      max-width: 760px;
      margin: 0 auto 24px;
    }
    .card h2 { font-size: 1rem; font-weight: 600; color: #94a3b8; margin-bottom: 16px; text-transform: uppercase; letter-spacing: .05em; }

    label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 6px; margin-top: 16px; }
    label:first-of-type { margin-top: 0; }

    select, input[type=text] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #374151;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 10px 12px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
    }
    select:focus, input:focus { border-color: #6366f1; }

    /* Portal Picker */
    .portal-picker { margin-top: 4px; background: #0f1117; border: 1px solid #374151; border-radius: 8px; overflow: hidden; }
    .portal-picker-toggle {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; cursor: pointer; user-select: none; transition: background .15s;
    }
    .portal-picker-toggle:hover { background: #1a2035; }
    .portal-toggle-label { font-size: 0.88rem; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 88%; }
    .portal-toggle-label.has-selection { color: #e2e8f0; }
    .toggle-arrow { color: #64748b; font-size: 1.1rem; transition: transform .2s; flex-shrink: 0; }
    .portal-picker.open .toggle-arrow { transform: rotate(180deg); }
    .portal-picker-body { display: none; border-top: 1px solid #374151; }
    .portal-picker.open .portal-picker-body { display: block; }
    .portal-picker-top {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; border-bottom: 1px solid #374151;
    }
    .portal-picker-top span { font-size: 0.75rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .ctrl-btn {
      background: transparent; border: 1px solid #374151; color: #94a3b8;
      border-radius: 6px; padding: 3px 10px; font-size: 0.74rem; cursor: pointer;
      margin-left: 6px; transition: border-color .2s, color .2s; width: auto;
    }
    .ctrl-btn:hover { border-color: #6366f1; color: #a5b4fc; }
    #portal-search { border: none !important; border-bottom: 1px solid #374151 !important; border-radius: 0 !important; font-size: 0.85rem; }
    #portal-search:focus { border-bottom-color: #6366f1 !important; }
    .portal-list { max-height: 160px; overflow-y: auto; }
    .portal-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      cursor: pointer; font-size: 0.9rem; color: #cbd5e1;
      border-bottom: 1px solid #1e2330; transition: background .15s;
    }
    .portal-item:last-child { border-bottom: none; }
    .portal-item:hover { background: #1a2035; }
    .portal-item:has(input:checked) { background: #1e1f3a; color: #e2e8f0; }
    .portal-item input[type=checkbox] { accent-color: #6366f1; width: 16px; height: 16px; flex-shrink: 0; }
    .portal-item.hidden { display: none; }

    button#btn-run {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #6366f1;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .2s, opacity .2s;
    }
    button#btn-run:hover:not(:disabled) { background: #4f46e5; }
    button#btn-run:disabled { opacity: .5; cursor: not-allowed; }

    /* History */
    #history-section { display: none; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    thead th {
      text-align: left;
      color: #64748b;
      font-weight: 600;
      padding: 8px 10px;
      border-bottom: 1px solid #2d3748;
    }
    tbody tr { border-bottom: 1px solid #1e2330; transition: background .15s; }
    tbody tr:hover { background: #1a2035; }
    tbody td { padding: 10px; color: #cbd5e1; vertical-align: middle; }

    a.report-btn {
      display: inline-block;
      padding: 4px 10px;
      background: #1e3a5f;
      color: #93c5fd;
      border-radius: 6px;
      font-size: 0.78rem;
      text-decoration: none;
    }
    a.report-btn:hover { background: #1d4ed8; color: #fff; }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .dot-running { background: #3b82f6; animation: pulse 1s infinite; }
    .dot-done    { background: #22c55e; }
    .dot-error   { background: #ef4444; }

    .estado-item {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .estado-item + .estado-item { margin-top: 4px; }

    .reporte-links {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: .3; }
    }
  </style>
</head>
<body>

<header>
  <h1>QA Auto Portales</h1>
  <p>Ejecución automatizada de pruebas de portales cautivos</p>
</header>

<!-- Formulario de ejecución -->
<div class="card">
  <h2>Nueva ejecución</h2>

  <label>Portal(es) a probar</label>
  <div class="portal-picker" id="portal-picker">
    <div class="portal-picker-toggle" id="portal-picker-toggle">
      <span class="portal-toggle-label" id="portal-toggle-label">Selecciona portal(es)</span>
      <span class="toggle-arrow">▾</span>
    </div>
    <div class="portal-picker-body">
      <div class="portal-picker-top">
        <span id="portal-count-label">Cargando...</span>
        <div>
          <button type="button" class="ctrl-btn" id="btn-select-all">Seleccionar todos</button>
          <button type="button" class="ctrl-btn" id="btn-deselect">Deseleccionar</button>
        </div>
      </div>
      <input type="text" id="portal-search" placeholder="Buscar portal..." />
      <div id="portal-list"></div>
    </div>
  </div>

  <button id="btn-run" disabled>▶ Ejecutar prueba</button>
</div>


<!-- Historial -->
<div class="card" id="history-section">
  <h2>Historial de ejecuciones</h2>
  <table>
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Portal</th>
        <th>Estado</th>
        <th>Duración</th>
        <th>Reporte</th>
      </tr>
    </thead>
    <tbody id="history-body"></tbody>
  </table>
</div>

<script>
  const btnRun           = document.getElementById('btn-run');
  const portalPicker     = document.getElementById('portal-picker');
  const portalToggle     = document.getElementById('portal-picker-toggle');
  const portalToggleLabel= document.getElementById('portal-toggle-label');
  const portalList       = document.getElementById('portal-list');
  const portalCountLabel = document.getElementById('portal-count-label');
  const portalSearch     = document.getElementById('portal-search');
  const btnSelectAll     = document.getElementById('btn-select-all');
  const btnDeselect      = document.getElementById('btn-deselect');
  const historySection   = document.getElementById('history-section');
  const historyBody      = document.getElementById('history-body');

  let portalesData = [];

  // ── Carga portales como checkboxes ─────────────────────────────
  fetch('/portales')
    .then(r => r.json())
    .then(portales => {
      portalesData = portales;
      portalList.innerHTML = portales.map(p =>
        `<label class="portal-item">
          <input type="checkbox" name="portal" value="${p.id}" />
          ${p.nombre}
        </label>`
      ).join('');
      portalList.querySelectorAll('input').forEach(cb =>
        cb.addEventListener('change', updateBtnState)
      );
      updateCount();
    })
    .catch(() => {
      portalCountLabel.textContent = 'Error al cargar';
      portalList.innerHTML = '<span style="color:#ef4444;padding:10px 12px;display:block">Error al cargar portales</span>';
    });

  function getChecked() {
    return [...portalList.querySelectorAll('input:checked')].map(cb => cb.value);
  }

  function updateCount() {
    const total   = portalList.querySelectorAll('input').length;
    const checked = getChecked().length;
    portalCountLabel.textContent = checked > 0
      ? `${checked} de ${total} seleccionado${checked !== 1 ? 's' : ''}`
      : `${total} portal${total !== 1 ? 'es' : ''} disponible${total !== 1 ? 's' : ''}`;
    // Actualiza el label del toggle con los nombres seleccionados
    const names = getChecked().map(id => (portalesData.find(p => p.id === id) || {}).nombre || id);
    portalToggleLabel.textContent = names.length > 0 ? names.join(', ') : 'Selecciona portal(es)';
    portalToggleLabel.classList.toggle('has-selection', names.length > 0);
  }

  function updateBtnState() {
    btnRun.disabled = getChecked().length === 0;
    updateCount();
  }

  // ── Abrir / cerrar picker ───────────────────────────────────────
  portalToggle.addEventListener('click', () => {
    portalPicker.classList.toggle('open');
  });

  // ── Buscar portal ───────────────────────────────────────────────
  portalSearch.addEventListener('input', function () {
    const q = this.value.toLowerCase();
    portalList.querySelectorAll('.portal-item').forEach(item => {
      item.classList.toggle('hidden', !item.textContent.toLowerCase().includes(q));
    });
  });

  // ── Seleccionar todos los visibles / Deseleccionar ──────────────
  btnSelectAll.addEventListener('click', () => {
    portalList.querySelectorAll('.portal-item:not(.hidden) input').forEach(cb => { cb.checked = true; });
    updateBtnState();
  });
  btnDeselect.addEventListener('click', () => {
    portalList.querySelectorAll('input').forEach(cb => { cb.checked = false; });
    updateBtnState();
  });

  // ── Ejecutar prueba ─────────────────────────────────────────────
  btnRun.addEventListener('click', async () => {
    const checkedIds = getChecked();
    if (!checkedIds.length) return;

    btnRun.disabled = true;
    btnRun.textContent = '⏳ Ejecutando...';

    await lanzarRun({ portal_ids: checkedIds, escenario: 'varios' });

    loadHistory();
    btnRun.disabled = false;
    btnRun.textContent = '▶ Ejecutar prueba';
  });

  // ── Lanza un run (único o batch) y transmite su WebSocket ───────
  function lanzarRun(payload) {
    return fetch('/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    })
    .then(r => r.json())
    .then(({ run_id }) => new Promise(resolve => {
      const ws = new WebSocket(`ws://${location.host}/live/${run_id}`);
      ws.onmessage = () => {};
      ws.onclose = () => resolve();
    }));
  }

  // ── Historial ───────────────────────────────────────────────────
  function dotClass(estado) {
    if (estado === 'done')  return 'dot dot-done';
    if (estado === 'error') return 'dot dot-error';
    return 'dot dot-running';
  }

  function estadoLabel(est) {
    return est === 'done' ? 'OK' : est === 'error' ? 'FALLO' : est;
  }

  function renderEstado(r) {
    if (r.resultados) {
      let res;
      try { res = JSON.parse(r.resultados); } catch { res = null; }
      if (res && typeof res === 'object') {
        return Object.entries(res).map(([, est]) =>
          `<div class="estado-item"><span class="dot ${dotClass(est)}"></span><span>${estadoLabel(est)}</span></div>`
        ).join('');
      }
    }
    return `<div class="estado-item"><span class="dot ${dotClass(r.estado)}"></span><span>${estadoLabel(r.estado)}</span></div>`;
  }

  function renderReportes(ruta_reporte, portal_nombre) {
    if (!ruta_reporte) return '—';
    let rutas;
    try { rutas = JSON.parse(ruta_reporte); if (!Array.isArray(rutas)) rutas = [ruta_reporte]; }
    catch { rutas = [ruta_reporte]; }
    return rutas.map((r, i) => {
      let label;
      if (rutas.length === 1) {
        label = portal_nombre || 'Ver';
      } else {
        const pid = r.split('/')[2];
        label = (portalesData.find(p => p.id === pid) || {}).nombre || `Ver ${i + 1}`;
      }
      return `<a class="report-btn" href="/reportes/${r}" target="_blank">${label}</a>`;
    }).join('');
  }

  function loadHistory() {
    fetch('/history')
      .then(r => r.json())
      .then(runs => {
        if (!runs.length) return;
        historySection.style.display = 'block';
        historyBody.innerHTML = runs.map(r => `
          <tr>
            <td>${r.fecha}</td>
            <td>${r.portal_nombre.split(', ').map(n => `<div>${n}</div>`).join('')}</td>
            <td>${renderEstado(r)}</td>
            <td>${r.duracion_seg != null ? r.duracion_seg + 's' : '—'}</td>
            <td><div class="reporte-links">${renderReportes(r.ruta_reporte, r.portal_nombre)}</div></td>
          </tr>`).join('');
      });
  }

  loadHistory();
</script>
</body>
</html>
