<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QA Auto Portales</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; color: #f8fafc; }
    header p  { font-size: 0.9rem; color: #64748b; margin-top: 4px; }

    .card {
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 24px;
      max-width: 760px;
      margin: 0 auto 24px;
    }
    .card h2 { font-size: 1rem; font-weight: 600; color: #94a3b8; margin-bottom: 16px; text-transform: uppercase; letter-spacing: .05em; }

    label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 6px; margin-top: 16px; }
    label:first-of-type { margin-top: 0; }

    select, input[type=text] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #374151;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 10px 12px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
    }
    select:focus, input:focus { border-color: #6366f1; }

    .radio-group {
      display: flex;
      gap: 12px;
      margin-top: 4px;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      cursor: pointer;
      background: #0f1117;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 10px 16px;
      flex: 1;
      transition: border-color .2s, background .2s;
    }
    .radio-group input[type=radio] { accent-color: #6366f1; width: 16px; height: 16px; }
    .radio-group label:has(input:checked) { border-color: #6366f1; background: #1e1f3a; }

    button#btn-run {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #6366f1;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .2s, opacity .2s;
    }
    button#btn-run:hover:not(:disabled) { background: #4f46e5; }
    button#btn-run:disabled { opacity: .5; cursor: not-allowed; }

    #output-card { display: none; }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-running { background: #1d4ed8; color: #bfdbfe; }
    .badge-done    { background: #15803d; color: #bbf7d0; }
    .badge-error   { background: #b91c1c; color: #fecaca; }

    #terminal {
      background: #0a0c10;
      border: 1px solid #1f2937;
      border-radius: 8px;
      padding: 16px;
      height: 340px;
      overflow-y: auto;
      font-family: "Fira Code", "Courier New", monospace;
      font-size: 0.8rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-all;
      color: #a3e635;
    }

    #report-link {
      display: none;
      margin-top: 14px;
      padding: 12px 16px;
      background: #14532d;
      border: 1px solid #16a34a;
      border-radius: 8px;
      color: #4ade80;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
    }
    #report-link:hover { background: #166534; }

    /* History */
    #history-section { display: none; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    thead th {
      text-align: left;
      color: #64748b;
      font-weight: 600;
      padding: 8px 10px;
      border-bottom: 1px solid #2d3748;
    }
    tbody tr { border-bottom: 1px solid #1e2330; transition: background .15s; }
    tbody tr:hover { background: #1a2035; }
    tbody td { padding: 10px; color: #cbd5e1; vertical-align: middle; }

    a.report-btn {
      display: inline-block;
      padding: 4px 10px;
      background: #1e3a5f;
      color: #93c5fd;
      border-radius: 6px;
      font-size: 0.78rem;
      text-decoration: none;
    }
    a.report-btn:hover { background: #1d4ed8; color: #fff; }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .dot-running { background: #3b82f6; animation: pulse 1s infinite; }
    .dot-done    { background: #22c55e; }
    .dot-error   { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: .3; }
    }
  </style>
</head>
<body>

<header>
  <h1>QA Auto Portales</h1>
  <p>Ejecución automatizada de pruebas de portales cautivos</p>
</header>

<!-- Formulario de ejecución -->
<div class="card">
  <h2>Nueva ejecución</h2>

  <label for="portal-select">Portal a probar</label>
  <select id="portal-select">
    <option value="">Cargando portales...</option>
  </select>

  <label>Escenario</label>
  <div class="radio-group">
    <label>
      <input type="radio" name="escenario" value="unico" checked />
      Único
    </label>
    <label>
      <input type="radio" name="escenario" value="varios" />
      Varios
    </label>
  </div>

  <button id="btn-run" disabled>▶ Ejecutar prueba</button>
</div>

<!-- Output en vivo -->
<div class="card" id="output-card">
  <div id="status-bar">
    <span id="status-badge" class="badge badge-running">Running</span>
    <span id="run-label" style="color:#64748b;font-size:.85rem;"></span>
  </div>
  <div id="terminal"></div>
  <a id="report-link" href="#" target="_blank">📄 Ver reporte completo</a>
</div>

<!-- Historial -->
<div class="card" id="history-section">
  <h2>Historial de ejecuciones</h2>
  <table>
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Portal</th>
        <th>Escenario</th>
        <th>Estado</th>
        <th>Duración</th>
        <th>Reporte</th>
      </tr>
    </thead>
    <tbody id="history-body"></tbody>
  </table>
</div>

<script>
  const btnRun     = document.getElementById('btn-run');
  const portalSel  = document.getElementById('portal-select');
  const terminal   = document.getElementById('terminal');
  const outputCard = document.getElementById('output-card');
  const statusBadge= document.getElementById('status-badge');
  const runLabel   = document.getElementById('run-label');
  const reportLink = document.getElementById('report-link');
  const historySection = document.getElementById('history-section');
  const historyBody    = document.getElementById('history-body');

  // ── Carga portales ──────────────────────────────────────────────
  fetch('/portales')
    .then(r => r.json())
    .then(portales => {
      portalSel.innerHTML = portales.map(p =>
        `<option value="${p.id}">${p.nombre}</option>`
      ).join('');
      btnRun.disabled = false;
    })
    .catch(() => { portalSel.innerHTML = '<option value="">Error al cargar portales</option>'; });

  // ── Ejecutar prueba ─────────────────────────────────────────────
  btnRun.addEventListener('click', async () => {
    const portalId  = portalSel.value;
    const escenario = document.querySelector('input[name=escenario]:checked').value;
    if (!portalId) return;

    btnRun.disabled = true;
    terminal.textContent = '';
    reportLink.style.display = 'none';
    outputCard.style.display  = 'block';
    statusBadge.className     = 'badge badge-running';
    statusBadge.textContent   = 'Running';
    runLabel.textContent      = `${portalSel.options[portalSel.selectedIndex].text} — ${escenario}`;

    // Lanza el run
    const res = await fetch('/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ portal_id: portalId, escenario })
    });
    const { run_id } = await res.json();

    // Conecta WebSocket para streaming
    const ws = new WebSocket(`ws://${location.host}/live/${run_id}`);
    ws.onmessage = ({ data }) => {
      terminal.textContent += data;
      terminal.scrollTop = terminal.scrollHeight;
    };
    ws.onclose = async () => {
      // Consulta estado final
      const s = await fetch(`/status/${run_id}`).then(r => r.json());
      if (s.estado === 'done') {
        statusBadge.className   = 'badge badge-done';
        statusBadge.textContent = 'Completado';
        if (s.ruta_reporte) {
          reportLink.href         = `/reportes/${s.ruta_reporte}`;
          reportLink.style.display = 'block';
        }
      } else {
        statusBadge.className   = 'badge badge-error';
        statusBadge.textContent = 'Error';
      }
      btnRun.disabled = false;
      loadHistory();
    };
  });

  // ── Historial ───────────────────────────────────────────────────
  function dotClass(estado) {
    if (estado === 'done')    return 'dot dot-done';
    if (estado === 'error')   return 'dot dot-error';
    return 'dot dot-running';
  }

  function loadHistory() {
    fetch('/history')
      .then(r => r.json())
      .then(runs => {
        if (!runs.length) return;
        historySection.style.display = 'block';
        historyBody.innerHTML = runs.map(r => `
          <tr>
            <td>${r.fecha}</td>
            <td>${r.portal_nombre}</td>
            <td>${r.escenario}</td>
            <td><span class="dot ${dotClass(r.estado)}"></span>${r.estado}</td>
            <td>${r.duracion_seg != null ? r.duracion_seg + 's' : '—'}</td>
            <td>${r.ruta_reporte
              ? `<a class="report-btn" href="/reportes/${r.ruta_reporte}" target="_blank">Ver</a>`
              : '—'}</td>
          </tr>`).join('');
      });
  }

  loadHistory();
</script>
</body>
</html>
